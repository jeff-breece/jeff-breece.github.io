<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8d0d8" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#f4f6f8"/>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- Outer frame -->
  <rect x="60" y="40" width="680" height="370" rx="4"
        fill="none" stroke="#9aaabb" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Left column — sidebar skeleton -->
  <rect x="80" y="70" width="140" height="12" rx="2" fill="#c5cdd6"/>
  <rect x="80" y="92" width="100" height="8"  rx="2" fill="#d8dfe7"/>
  <rect x="80" y="108" width="120" height="8" rx="2" fill="#d8dfe7"/>
  <rect x="80" y="124" width="90"  height="8" rx="2" fill="#d8dfe7"/>

  <!-- Divider -->
  <line x1="260" y1="60" x2="260" y2="390" stroke="#b0bec8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Content area — title bar -->
  <rect x="280" y="70" width="440" height="18" rx="3" fill="#8aa0b4"/>

  <!-- Content blocks -->
  <rect x="280" y="102" width="440" height="8" rx="2" fill="#c5cdd6"/>
  <rect x="280" y="116" width="380" height="8" rx="2" fill="#c5cdd6"/>
  <rect x="280" y="130" width="410" height="8" rx="2" fill="#c5cdd6"/>
  <rect x="280" y="144" width="320" height="8" rx="2" fill="#c5cdd6"/>

  <!-- Image placeholder -->
  <rect x="280" y="168" width="200" height="130" rx="3"
        fill="#dde4eb" stroke="#b0bec8" stroke-width="1"/>
  <!-- Image cross -->
  <line x1="280" y1="168" x2="480" y2="298" stroke="#b0bec8" stroke-width="1"/>
  <line x1="480" y1="168" x2="280" y2="298" stroke="#b0bec8" stroke-width="1"/>

  <!-- More text blocks beside image -->
  <rect x="494" y="168" width="226" height="8"  rx="2" fill="#c5cdd6"/>
  <rect x="494" y="184" width="200" height="8"  rx="2" fill="#c5cdd6"/>
  <rect x="494" y="200" width="210" height="8"  rx="2" fill="#c5cdd6"/>
  <rect x="494" y="216" width="180" height="8"  rx="2" fill="#c5cdd6"/>
  <rect x="494" y="232" width="220" height="8"  rx="2" fill="#c5cdd6"/>
  <rect x="494" y="248" width="190" height="8"  rx="2" fill="#c5cdd6"/>

  <!-- Lower text blocks (full width) -->
  <rect x="280" y="316" width="440" height="8" rx="2" fill="#c5cdd6"/>
  <rect x="280" y="330" width="400" height="8" rx="2" fill="#c5cdd6"/>
  <rect x="280" y="344" width="420" height="8" rx="2" fill="#c5cdd6"/>
  <rect x="280" y="358" width="350" height="8" rx="2" fill="#c5cdd6"/>

  <!-- Tag pills -->
  <rect x="280" y="376" width="60" height="14" rx="7" fill="#8aa0b4" opacity="0.5"/>
  <rect x="348" y="376" width="80" height="14" rx="7" fill="#8aa0b4" opacity="0.5"/>
  <rect x="436" y="376" width="55" height="14" rx="7" fill="#8aa0b4" opacity="0.5"/>
</svg>
