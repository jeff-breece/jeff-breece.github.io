name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for jekyll-seo-tag last-modified

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: true   # runs bundle install and caches gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Verify build output
        run: |
          test -f _site/index.html          || (echo "FAIL: index.html missing" && exit 1)
          test -f _site/assets/css/jekyll-theme-chirpy.css || (echo "FAIL: CSS missing" && exit 1)
          test -f _site/feed.xml            || (echo "FAIL: feed.xml missing" && exit 1)
          test -f _site/assets/img/favicons/favicon.ico || (echo "FAIL: favicon missing" && exit 1)
          echo "Build verification passed."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
