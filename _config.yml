theme: jekyll-theme-chirpy

lang: en
timezone: America/New_York

title: Jeff Breece
tagline: "Systems architect, hands-on engineer, trail runner, home cook."

description: >-
  Personal log of a gentleman engineer and systems architect — engineering notes,
  architecture patterns, AI & homelab experiments, trail essays, and occasional
  reflections on work and life.

url: "https://jeff-breece.github.io"
baseurl: ""

github:
  username: jeff-breece

linkedin:
  username: jeffrey-a-breece

social:
  name: Jeff Breece
  email: jeffbreece@outlook.com
  links:
    - https://github.com/jeff-breece
    - https://www.linkedin.com/in/jeffrey-a-breece

# Site avatar (square image shown in sidebar)
avatar: /images/1990-jeff.jpg

# Leave blank to respect OS preference; or set "light" or "dark"
theme_mode:

# Google Analytics — leave blank to disable
google_analytics:
  id: ""

# Comments — disabled
comments:
  active: ""

# Table of contents default
toc: true

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    default_lang: text
    guess_lang: true
  smart_quotes: ["apos", "apos", "quot", "quot"]
  footnote_nr: 1
  entity_output: as_char
  toc_levels: [1, 2, 3, 4, 5, 6]
  use_coderay: false

# Sass
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

paginate: 10
paginate_path: "/page:num/"

# Feed
feed:
  posts_limit: 20

# Collections
collections:
  tabs:
    output: true
    sort_by: order
  galleries:
    output: true
    permalink: /gallery/:name/

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
      math: false
      mermaid: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: "_galleries"
      type: galleries
    values:
      layout: gallery

# Exclude from build
exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - THEME_SELECTION_2026.md
  - migration-prep.txt
  - run-legacy-import.ps1
  - scripts/
  - _posts_imported/
  - migration_reports_v2/
  - gallery-site/
  - vendor/
  - .bundle/
  - .jekyll-cache/
  - assets/img/favicons/site.webmanifest
  - assets/img/favicons/browserconfig.xml
